services:
  postgres:
    image: postgres:15-alpine
    container_name: adaptive-ui-postgres
    environment:
      POSTGRES_DB: adaptive_ui
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis_dev_pwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis -d adaptive_ui"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
